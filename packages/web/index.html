<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>The Component Library for Dioxus</title>
    <meta name="description" content="A set of beautifully designed components that you can customize, extend, and build on." />
    <meta property="og:title" content="The Component Library for Dioxus" />
    <meta property="og:description" content="A set of beautifully designed components that you can customize, extend, and build on." />
    <meta property="og:image" content="https://shadcn-dioxus.com/assets/og.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://shadcn-dioxus.com/assets/og.png" />
    <meta name="apple-mobile-web-app-title" content="Shadcn Dioxus" />
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body>
    <div id="main" class="min-h-screen bg-background" style="display: contents"></div>
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      document.querySelectorAll("pre").forEach(function(pre) {
        var button = document.createElement("button");
        button.textContent = "Copy";
        button.addEventListener("click", function() {
          var code = pre.querySelector("code") || pre;
          navigator.clipboard.writeText(code.textContent).then(function() {
            button.classList.add("copied"); button.textContent = "Copy";
            setTimeout(function() { button.classList.remove("copied"); }, 2000);
          });
        });
        pre.style.position = "relative";
        pre.appendChild(button);
      });
    });
  </script>
  <style>
      position: absolute;
      top: 0.3rem;
      right: 0.3rem;
      padding: 0.2rem 0.4rem;
      font-size: 0.7rem;
      opacity: 0.6;
      transition: opacity 0.2s;
      background: transparent;
      color: inherit;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }

  </style>

  <script>
    document.addEventListener("click", function(e) {
        window.scrollTo(0, 0);
      }
    });
  </script>

  </body>
</html>
