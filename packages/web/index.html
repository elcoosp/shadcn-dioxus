<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>The Component Library for Dioxus</title>
    <meta name="description" content="A set of beautifully designed components that you can customize, extend, and build on." />
    <meta property="og:title" content="The Component Library for Dioxus" />
    <meta property="og:description" content="A set of beautifully designed components that you can customize, extend, and build on." />
    <meta property="og:image" content="https://shadcn-dioxus.com/assets/og.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://shadcn-dioxus.com/assets/og.png" />
    <meta name="apple-mobile-web-app-title" content="Shadcn Dioxus" />
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body>
    <div id="main" class="min-h-screen bg-background" style="display: contents"></div>
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      document.querySelectorAll("pre").forEach(function(pre) {
        var button = document.createElement("button");
        button.className = "copy-button";
        button.textContent = "Copy";
        button.addEventListener("click", function() {
          var code = pre.querySelector("code") || pre;
          navigator.clipboard.writeText(code.textContent).then(function() {
            button.textContent = "Copied!";
            setTimeout(function() { button.textContent = "Copy"; }, 2000);
          });
        });
        pre.style.position = "relative";
        pre.appendChild(button);
      });
    });
  </script>
  <style>
    .copy-button {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      padding: 0.25rem 0.5rem;
      font-size: 0.75rem;
      line-height: 1;
      background: var(--code-highlight);
      color: var(--code-foreground);
      border: 1px solid var(--border);
      border-radius: 0.25rem;
      cursor: pointer;
      opacity: 0.8;
    }
    .copy-button:hover { opacity: 1; }
  </style>

  </body>
</html>
